---
# ============================================================
# kafka configs
# ============================================================

apiVersion: v1
kind: Pod
metadata:
  name: kafka-pod
  labels:
    app: kafka-pod
  namespace: java-microservices
spec:
  containers:
    - name: kafka
      image: confluentinc/cp-kafka
      ports:
        - containerPort: 9092
        - containerPort: 9093
      env:
        - name: KAFKA_KRAFT_MODE
          value: "true"
        - name: CLUSTER_ID
          value: "jhguyhnoijmcoi"
        - name: KAFKA_NODE_ID
          value: "1"
        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"
        # Changed to localhost since the controller and broker are in the same pod
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "1@localhost:9093"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
        # This tells the Spring app to connect via localhost
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://kafka-service:9092"
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"
        - name: KAFKA_LOG_DIRS
          value: "/var/lib/kafka/data"
      volumeMounts:
        - name: kafka-kraft
          mountPath: /var/lib/kafka/data
  volumes:
    - name: kafka-kraft
      emptyDir: {}

---
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: java-microservices
spec:
  selector:
    app: kafka-pod
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
